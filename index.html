<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Bot Funnel</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
}

.chat{
    max-width:500px;
    margin:auto;
    padding:20px;
}

.page{
    display:none;
}

.page.active{
    display:block;
}

.box{
    background:white;
    padding:20px;
    border-radius:15px;
    margin-top:20px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

.title{
    font-size:24px;
    font-weight:bold;
}

.headline{
    font-size:18px;
    margin-top:10px;
}

.details{
    margin-top:10px;
}

.btn{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

.yes{background:#28a745;color:white;}
.no{background:#dc3545;color:white;}

.pay{
    background:#007bff;
    color:white;
}

.telegram{
    text-align:center;
    margin-top:30px;
}

.telegram img{
    width:120px;
}
</style>
</head>
<body>

<div class="chat">

<!-- PAGE 1 -->
<div class="page active" id="page1">
<div class="box">
<div class="title">TITLE 1</div>
<div class="headline">HEADLINE 1</div>
<div class="details">
এখানে আপনার মেসেজ লিখবেন।
</div>

<button class="btn yes" onclick="nextPage(2)">হ্যাঁ</button>
<button class="btn no">না</button>
</div>
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
<div class="box">
<div class="title">TITLE 2</div>
<div class="headline">HEADLINE 2</div>
<div class="details">
এখানে ২য় মেসেজ লিখবেন।
</div>

<button class="btn yes" onclick="nextPage(3)">করতে চাই</button>
</div>
</div>

<!-- PAGE 4 -->
<div class="page" id="page3">
<div class="box">
<div class="title">TITLE 4</div>
<div class="headline">HEADLINE 4</div>
<div class="details">
এখানে ৪ নম্বর মেসেজ লিখবেন।
</div>

<button class="btn pay" onclick="nextPage(4)">
Pay Korbo
</button>
</div>
</div>

<!-- PAYMENT -->
<div class="page" id="page4">
<div class="box">

<h3>Payment Method</h3>

<label>
<input type="radio" name="pay">
bKash - 01842151907
</label>

<br><br>

<label>
<input type="radio" name="pay">
Nagad / Rocket - 01631348072
</label>

<br><br>

<input
type="text"
placeholder="Transaction ID"
style="width:100%;padding:10px;"
>

<button class="btn pay" onclick="nextPage(5)">
Submit
</button>

</div>
</div>

<!-- TELEGRAM -->
<div class="page" id="page5">
<div class="box">

<h2>ধন্যবাদ</h2>

<div class="telegram">

<a href="https://t.me/your_username" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg">
</a>

<br><br>

<a href="https://t.me/your_group_link" target="_blank">
Telegram Group
</a>

</div>

</div>
</div>

</div>

<script>
function nextPage(page){
document.querySelectorAll('.page')
.forEach(p=>p.classList.remove('active'));

document
.getElementById('page'+page)
.classList.add('active');
}
</script>

</body>
</html>
