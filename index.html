<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Class Service</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    margin:0;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

.hidden{
    display:none;
}

h3{
    margin-top:0;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.btn{
    background:#1877f2;
    color:white;
}

input,select{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

.info{
    background:#f8f8f8;
    padding:12px;
    border-radius:8px;
    margin-top:10px;
}
</style>

</head>
<body>

<div class="container">

    <!-- STEP 1 -->

    <div id="step1">

        <h3>[MESSAGE_1]</h3>

        <button class="btn" onclick="showStep2()">হ্যাঁ</button>

        <button onclick="showStep2()">না</button>

    </div>

    <!-- STEP 2 -->

    <div id="step2" class="hidden">

        <h3>[MESSAGE_2]</h3>

        <button class="btn" onclick="showStep3()">করতে চাই</button>

    </div>

    <!-- STEP 3 -->

    <div id="step3" class="hidden">

        <h3>[MESSAGE_3_TITLE]</h3>

        <input type="text" id="name" placeholder="নাম">

        <input type="text" id="phone" placeholder="ফোন">

        <input type="text" id="district" placeholder="জেলা">

        <select id="nightWork">
            <option value="">রাতে কাজ করতে পারবেন?</option>
            <option>হ্যাঁ</option>
            <option>না</option>
        </select>

        <button class="btn" onclick="submitForm()">জমা দিন</button>

    </div>

    <!-- STEP 4 -->

    <div id="step4" class="hidden">

        <h3>[MESSAGE_4_PAYMENT_TEXT]</h3>

        <button onclick="selectPayment('Bkash')">🟢 বিকাশ</button>

        <button onclick="selectPayment('Nagad')">🟠 নগদ</button>

        <button onclick="selectPayment('Rocket')">🔵 রকেট</button>

        <div id="paymentBox"></div>

    </div>

    <!-- STEP 5 -->

    <div id="step5" class="hidden">

        <h3>[MESSAGE_5_TRX_TEXT]</h3>

        <input type="text" id="trxId" placeholder="TRX ID">

        <button class="btn" onclick="goSuccess()">পরবর্তী</button>

    </div>

    <!-- SUCCESS -->

    <div id="success" class="hidden">

        <h2>সফলভাবে সম্পন্ন হয়েছে</h2>

        <p>
            Telegram Group:
            <br>
            [GROUP_LINK]
        </p>

        <p>
            Contact:
            <br>
            [CONTACT_USERNAME]
        </p>

    </div>

</div>

<script>

let selectedPayment='';

function showStep2(){

    document.getElementById('step1').classList.add('hidden');
    document.getElementById('step2').classList.remove('hidden');

}

function showStep3(){

    document.getElementById('step2').classList.add('hidden');
    document.getElementById('step3').classList.remove('hidden');

}

function submitForm(){

    let name=document.getElementById('name').value;
    let phone=document.getElementById('phone').value;
    let district=document.getElementById('district').value;
    let night=document.getElementById('nightWork').value;

    if(!name || !phone || !district || !night){

        alert('সব তথ্য পূরণ করুন');
        return;

    }

    document.getElementById('step3').classList.add('hidden');
    document.getElementById('step4').classList.remove('hidden');

}

function selectPayment(method){

    selectedPayment=method;

    let number='';

    if(method==='Bkash'){
        number='[BKASH_NUMBER]';
    }

    if(method==='Nagad'){
        number='[NAGAD_NUMBER]';
    }

    if(method==='Rocket'){
        number='[ROCKET_NUMBER]';
    }

    document.getElementById('paymentBox').innerHTML=`

        <div class="info">

            <p><b>Method:</b> ${method}</p>

            <p><b>Number:</b> ${number}</p>

            <p><b>Amount:</b> [PRICE]</p>

            <button class="btn" onclick="showTrxStep()">
                পে করবো
            </button>

        </div>

    `;

}

function showTrxStep(){

    document.getElementById('step4').classList.add('hidden');
    document.getElementById('step5').classList.remove('hidden');

}

function goSuccess(){

    let trx=document.getElementById('trxId').value;

    if(!trx){

        alert('TRX ID দিন');
        return;

    }

    document.getElementById('step5').classList.add('hidden');
    document.getElementById('success').classList.remove('hidden');

}

</script>

</body>
</html>
